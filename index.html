  const ua = navigator.userAgentData;

    'userAgentData.platform': safe(() => ua?.platform),
    'userAgentData.brands': safe(() => JSON.stringify(ua?.brands)),

}

// ── 2b. UA High Entropy (async) ──
async function collectUAHighEntropy() {
  const result = {};
  try {
    const ua = navigator.userAgentData;
    if (!ua?.getHighEntropyValues) {
      result['getHighEntropyValues'] = 'not available';
      return result;
    }
    const he = await ua.getHighEntropyValues([
      'architecture', 'bitness', 'model', 'platformVersion',
      'uaFullVersion', 'fullVersionList', 'wow64',
    ]);
    result['highEntropy.architecture'] = he.architecture;
    result['highEntropy.bitness'] = he.bitness;
    result['highEntropy.model'] = he.model;
    result['highEntropy.platformVersion'] = he.platformVersion;
    result['highEntropy.uaFullVersion'] = he.uaFullVersion;
    result['highEntropy.wow64'] = he.wow64;
    result['highEntropy.fullVersionList'] = JSON.stringify(he.fullVersionList);
  } catch(e) {
    result['highEntropy.error'] = e.message;
  }
  return result;
}

// ── 8. Click Trust Test ──
// BotGuard: createElement("a") → onclick=None → click() → PointerEvent.isTrusted
function collectClickTrust() {
  return new Promise(resolve => {
    const a = document.createElement('a');
    a.href = '#';
    a.style.position = 'fixed'; a.style.left = '-9999px';
    document.body.appendChild(a);
    let trusted = null;
    a.onclick = (e) => { trusted = e.isTrusted; e.preventDefault(); };
    a.click();
    document.body.removeChild(a);
    resolve({ 'PointerEvent.isTrusted (programmatic click)': trusted });
  });
}

// ── 9. Permissions.query ──
// BotGuard: CALL Permissions.query({name:"notifications"}) every request
async function collectPermissions() {
  const result = {
    'typeof Permissions': safe(() => typeof Permissions),
    'typeof Permissions.prototype.query': safe(() => typeof Permissions.prototype?.query),
  };
  try {
    const status = await navigator.permissions.query({name: 'notifications'});
    result['Permissions.query({name:"notifications"})'] = status.state;
  } catch(e) {
    result['Permissions.query({name:"notifications"})'] = 'ERROR: ' + e.message;
  }
  return result;
}

// ── 10. iframe srcdoc cross-origin test ──
// BotGuard: createElement("iframe") → srcdoc → contentWindow → check chrome on child
function collectIframeTest() {
  return new Promise(resolve => {
    const result = {};
    const iframe = document.createElement('iframe');
    iframe.style.display = 'none';
    if (window.trustedTypes?.emptyHTML !== undefined) {
      iframe.srcdoc = window.trustedTypes.emptyHTML;
    } else {
      iframe.srcdoc = '';
    }
    document.body.appendChild(iframe);
    setTimeout(() => {
      result['iframe.contentWindow exists'] = safe(() => !!iframe.contentWindow);
      result['iframe.contentWindow.chrome'] = safe(() => typeof iframe.contentWindow?.chrome);
      result['iframe.contentWindow.chrome.csi'] = safe(() => typeof iframe.contentWindow?.chrome?.csi);
      result['iframe.contentWindow.chrome.csi()'] = safe(() => JSON.stringify(iframe.contentWindow?.chrome?.csi?.()));
      result['iframe.contentWindow.chrome.csi() descriptor'] = safe(() => {
        const obj = iframe.contentWindow?.chrome?.csi?.();
        if (!obj) return 'null';
        const d = Object.getOwnPropertyDescriptor(obj, 'startE');
        return d ? JSON.stringify({hasGet: !!d.get, hasSet: !!d.set, hasValue: 'value' in d}) : 'no descriptor';
      });
      result['iframe.contentWindow.chrome.runtime'] = safe(() => typeof iframe.contentWindow?.chrome?.runtime);
      result['iframe.contentWindow.navigator.webdriver'] = safe(() => iframe.contentWindow?.navigator?.webdriver);
      result['iframe.contentWindow.navigator.plugins.length'] = safe(() => iframe.contentWindow?.navigator?.plugins?.length);
      document.body.removeChild(iframe);
      resolve(result);
    }, 100);
  });
}

// BotGuard now calls getters directly, not just reads properties
function collectNavigatorGetterCalls() {
  const result = {};
  const navProto = Navigator.prototype;

  // All navigator properties BotGuard has probed (Feb + Mar)
  const navGetterProps = [
    'webdriver', 'hardwareConcurrency', 'maxTouchPoints', 'deviceMemory',
    'languages', 'plugins', 'mimeTypes', 'connection',
    // Random section probes
    'webkitTemporaryStorage', 'updateAdInterestGroups', 'mediaSession',
    'permissions', 'appCodeName', 'ink',
  ];

  navGetterProps.forEach(prop => {
    const desc = Object.getOwnPropertyDescriptor(navProto, prop);
    if (desc && desc.get) {
      result['Navigator.' + prop + ' getter exists'] = true;
      result['Navigator.' + prop + ' getter native'] = safe(() => desc.get.toString().includes('[native code]'));
      result['Navigator.' + prop + ' getter.call()'] = safe(() => {
        const val = desc.get.call(navigator);
        return typeof val === 'object' ? (val?.constructor?.name || typeof val) : val;
      });
    } else {
      result['Navigator.' + prop + ' getter exists'] = false;
    }
  });

  return result;
}

// ── 17. BotGuard div+CSS Exact Probe (PRIMARY DETECTION VECTOR) ──
// Replicates exactly what BotGuard does: createElement("div") → .style → read CSS prop
// This is where our spoofing leaks — 94% fail rate when this probe is present
function collectDivCSSProbe() {
  const result = {};

  // Step 1: createElement("div") — exactly as BotGuard does
  const div = document.createElement('div');
  result['div created'] = safe(() => div instanceof HTMLDivElement);
  result['div.style exists'] = safe(() => typeof div.style === 'object');
  result['div.style instanceof CSSStyleDeclaration'] = safe(() => div.style instanceof CSSStyleDeclaration);

  // Step 2: access .style and read properties — check for side effects
  const style = div.style;
  result['div.style.constructor.name'] = safe(() => style.constructor.name);
  result['div.style.__proto__ === CSSStyleDeclaration.prototype'] = safe(() =>
    Object.getPrototypeOf(style) === CSSStyleDeclaration.prototype
  );

  // Step 3: check if accessing style triggers any prototype pollution
  result['CSSStyleDeclaration.prototype pristine'] = safe(() => {
    const proto = CSSStyleDeclaration.prototype;
    const ownKeys = Object.getOwnPropertyNames(proto);
    // Should have standard methods like getPropertyValue, setProperty, etc.
    const expected = ['getPropertyValue', 'setProperty', 'removeProperty', 'item'];
    return expected.every(k => ownKeys.includes(k));
  });

  // Step 4: verify property descriptors are correct
  result['div.style property descriptor for "opacity"'] = safe(() => {
    // In real browser, CSS props on style object are own properties with value descriptor
    const val = style.opacity;
    return typeof val;  // should be "string" (empty string)
  });

  // Step 5: check getComputedStyle works (BotGuard probes Window.getComputedStyle)
  document.body.appendChild(div);
  result['getComputedStyle(div).opacity'] = safe(() => getComputedStyle(div).opacity);
  result['getComputedStyle(div).display'] = safe(() => getComputedStyle(div).display);
  document.body.removeChild(div);

  return result;
}

// ── 22. Media Devices ──
async function collectMediaDevices() {
  const result = {};
  try {
    const devices = await navigator.mediaDevices.enumerateDevices();
    result['mediaDevices.count'] = devices.length;
    const kinds = {};
    devices.forEach(d => { kinds[d.kind] = (kinds[d.kind] || 0) + 1; });
    result['mediaDevices.kinds'] = JSON.stringify(kinds);
  } catch(e) {
    result['mediaDevices.error'] = e.message;
  }
  return result;
}

// ── Render ──
function renderSection(title, data, container) {
  const section = document.createElement('div');
  section.className = 'section';
  const count = Object.keys(data).length;
  const header = document.createElement('div');
  header.className = 'section-header';
  header.innerHTML = title + ' <span style="color:#8b949e">' + count + ' checks</span>';
  header.onclick = function() { body.style.display = body.style.display === 'none' ? '' : 'none'; };
  const body = document.createElement('div');
  body.className = 'section-body';
  for (const [k, v] of Object.entries(data)) {
    const row = document.createElement('div');
    row.className = 'row';
    const valStr = v === undefined ? 'undefined' : v === null ? 'null' : String(v);
    let cls = 'val';
    if (v === false || v === undefined || v === null || (typeof v === 'string' && v.startsWith('ERROR'))) cls += ' fail';
    else if (v === true) cls += ' ok';
    row.innerHTML = '<span class="key">' + k + '</span><span class="' + cls + '">' + valStr + '</span>';
    body.appendChild(row);
  }
  section.appendChild(header);
  section.appendChild(body);
  container.appendChild(section);
}

  const sections = [

    ['Performance & Timing', collectPerformance()],

    ['Click Trust Test', clickTrust],

    ['toString() Integrity', collectToString()],
    ['Plugins & Codecs', collectMediaCodecs()],
    ['Plugins Detail', collectPluginsDetail()],
    ['Prototype Integrity', collectPrototypeIntegrity()],
    ['BotGuard Prototype Probes', collectPrototypeProbes()],
    ['Navigator Getter CALL Test', collectNavigatorGetterCalls()],
    ['BotGuard div+CSS Exact Probe', collectDivCSSProbe()],
    ['BotGuard MouseEvent Exact Probe', collectMouseEventProbe()],
    ['Document & Environment', collectEnvironment()],
    ['Media Devices', mediaDevices],
    ['API Presence (BotGuard sampling)', collectAPIPresence()],
  ];

  // reset fp
  Object.keys(fp).forEach(k => delete fp[k]);

  for (const [title, data] of sections) {
    renderSection(title, data, container);
    Object.assign(fp, data);
  }

  fp._timestamp = new Date().toISOString();
  fp._url = location.href;
  fp._userAgent = navigator.userAgent;

  // fill both outputs
  document.getElementById('json-output').textContent = JSON.stringify(fp, null, 2);
  document.getElementById('fingerprint-json').textContent = JSON.stringify(fp);
}

    ta.value = text; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    alert('Copied!');
  });
}

function saveJSON() {
  const blob = new Blob([JSON.stringify(fp, null, 2)], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'fingerprint_' + Date.now() + '.json';
  a.click();
}

function toggleRaw() {
  const el = document.getElementById('json-output');
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

// auto-run on page load
runAll();
</script>
</body>
</html>
